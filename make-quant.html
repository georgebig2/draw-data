<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <meta http-equiv='cache-control' content='no-cache'>
    <meta http-equiv='expires' content='0'>
    <meta http-equiv='pragma' content='no-cache'>
    <title>Quantize</title>
    <style>
        h1 {
            font-family: helvetica, arial, sans-serif;
            text-align: center;
            border: 0;
            margin: 0;
        }

        body {
            width: 95vw;
            /*    margin: 0 auto;
*/
            background-color: rgb(255, 212, 183);
            padding: 0 20px 20px 20px;
            /*border: 5px solid black;*/
        }

        .full-img img {
            display: inline-block;
            position: absolute;
            top: 0;
            left: 40%;
            max-height: 100%;
        }

        .num-img {
            float: left;
            position: relative;
        }

        .stack {
            position: relative;
            top: 0;
            left: 0;
            max-width: 100%;
            cursor: pointer;
        }

        .stack2 {
            position: absolute;
            top: 0;
            left: 0;
            max-width: 50%;
            cursor: pointer;
        }

        .close {
            position: absolute;
            top: 0;
            left: 0;
            cursor: no-drop;
        }

        .run {
            position: absolute;
            top: 0;
            right: 0;
            cursor: copy;
        }

        .desc {
            position: absolute;
            bottom: 0;
            left: 0;
            cursor: default;
            background-color: white;
        }

        .button-num {
            /*  border: 0;
  background: rgb(194, 105, 105);
  text-shadow: 1px 1px 1px white;
  border: 1px solid #999;*/
            /*position: absolute;*/
            cursor: pointer;
            /*    top: 5px;
    left: 5px;*/
        }

        .progress {
            position: absolute;
            top: 35px;
            left: 5px;
        }

        .preview {
            position: absolute;
            top: 4%;
            width: 30%;
            height: 90vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgb(194, 105, 105) orange;
            /*min-width : 150px;*/
        }

        .thumb-bar {
            display: inline;
            /*width: 30%;*/
            float: left;
            /*cursor: pointer;*/
            /*border: 1px solid rgb(95, 55, 55);*/
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 6px 0 10px 0;
        }

        .min-slider-control {
            position: fixed;
            top: 0;
            right: 0;
            width: 100px;
            height: auto;
            padding: 8px;
            background-color: rgb(255, 212, 183);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .min-slider-control label {
            font-size: 12px;
            font-weight: bold;
        }

        .min-slider-control input {
            width: 80px;
        }

        .palette-grid {
            position: fixed;
            top: 90px;
            right: 0;
            width: 100px;
            height: calc(100vh - 90px);
            background-color: rgb(255, 212, 183);
            padding: 0;
            overflow-y: auto;
            z-index: 1000;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            align-content: start;
        }

        .palette-box {
            aspect-ratio: 1;
            border-radius: 0px;
            cursor: pointer;
            background-color: rgb(255, 212, 183);
        }

        .palette-box.hidden {
            opacity: 0.2;
        }

        .palette-box input[type="color"] {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            border-radius: 0px;
            cursor: pointer;
            padding: 0;
            margin: 0;
            background-color: rgb(255, 212, 183);
        }

        body {
            width: 95vw;
            margin-right: 110px;
        }
    </style>
</head>

<body>
    <progress max="1" min="0" value="0"></progress>
    <!-- Min Slider Control at top-right -->
    <div class="min-slider-control">
        <label for="minSlider">thickness</label>
        <input type="range" id="minSlider" min="0" max="7" value="0" />
        <span id="minSliderValue">0</span>
    </div>
    <!-- Palette Grid on the right -->
    <div class="palette-grid" id="paletteGrid"></div>

    <div class="preview">
        <div class="control-row">
            <label for="paletteSlider">colors</label>
            <input type="range" id="paletteSlider" min="20" max="100" value="40" />
            <span id="paletteSliderValue">40</span>
        </div>
        <div class="control-row">
            <label for="randomSlider">merge</label>
            <input type="range" id="randomSlider" min="0" max="50" value="10" />
            <span id="randomSliderValue">5</span>
        </div>
        <div class="checkbox-row">
            <label for="filter">filter</label>
            <input type="checkbox" id="filter" unchecked />
        </div>

        <button id="fileButton" type="button">Open image</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
        <div class="thumb-bar"></div>
        <p id="status">loading...</p>
    </div>
    <div class="full-img">
        <img id="imageSrc" alt="" />
    </div>

    <script type="text/javascript">
        const imageSrc = document.getElementById('imageSrc');
        let mainImageSrc = null;
        let curImage = null;
        let updateImageTimeout = null;

        const fileButton = document.getElementById("fileButton");
        const progress = document.querySelector("progress");
        var fileInput = document.getElementById("fileInput");
        
        const paletteSlider = document.getElementById('paletteSlider');
        const paletteSliderValue = document.getElementById('paletteSliderValue');
        const randomSlider = document.getElementById('randomSlider');
        const randomSliderValue = document.getElementById('randomSliderValue');
        const minSlider = document.getElementById('minSlider');
        const minSliderValue = document.getElementById('minSliderValue');
        if (paletteSlider && paletteSliderValue) {
            paletteSlider.addEventListener('input', () => {
                paletteSliderValue.textContent = paletteSlider.value;
            });
        }
        if (randomSlider && randomSliderValue) {
            randomSlider.addEventListener('input', () => {
                randomSliderValue.textContent = randomSlider.value;
            });
        }
        if (minSlider && minSliderValue) {
            minSlider.addEventListener('input', () => {
                minSliderValue.textContent = minSlider.value;
                if (curColorBox)
                    curColorBox.minSliderValue = minSlider.value;
                updateImageWithPalette();
            });
        }
        //paletteSlider.hidden = true;
        //paletteSliderValue.hidden = true;
        const filter = document.getElementById('filter');

        // Worker pool: fetch worker script, create Blob URL and spawn multiple workers
        let gridWorkers = [];
        let workerReady = false;
        const poolSize = 1;//Math.max(1, (navigator.hardwareConcurrency || 4) - 1);
        let totalAssignedTasks = 0;
        let completedTasks = 0;
        progress.value = 0;
        progress.hidden = true;

        (async function initWorkerPool() {
            let blobUrl = 'quantize-worker.js';
            for (let i = 0; i < poolSize; i++) {
                const w = new Worker(blobUrl);

                w.onmessage = function (event) {
                    const { type, data, error } = event.data;
                    if (type === 'ready') {
                        workerReady = true;
                        console.log('worker ready (pool member)');
                    } else if (type === 'paletteResult') {
                        try {
                            //const imgData = new ImageData(data.imageData, data.width, data.height);
                            add_grid_image(data.imageData, data.uniqueColors);
                        } catch (e) {
                            console.error('Failed to construct ImageData from worker result', e);
                        }
                        completedTasks++;
                        console.log('result received; completed', completedTasks, 'of', totalAssignedTasks);

                        if (totalAssignedTasks > 0)
                            progress.value = completedTasks / totalAssignedTasks;
                        progress.hidden = (progress.value >= 1);

                    } else if (type === 'error') {
                        console.error('Worker error:', error);
                    } else if (type === 'updateImageResult') {
                        try {
                            const canvas = document.createElement('canvas');
                            canvas.width = data.imageData.width;
                            canvas.height = data.imageData.height;
                            const ctx = canvas.getContext('2d');
                            ctx.putImageData(data.imageData, 0, 0);
                            imageSrc.src = canvas.toDataURL();
                        } catch (e) {
                            console.error('Failed to construct ImageData from worker result', e);
                        }
                    }
                };

                w.onerror = function (e) {
                    console.error('Worker pool member error:', e);
                };

                gridWorkers.push(w);
            }
        })();

        window.onload = () => {
        };

        const emptyFile = fileInput.files;
        fileButton.addEventListener(
            "click",
            (e) => {
                fileInput.files = emptyFile;
                fileInput.click();
            },
            false,
        );
        fileInput.addEventListener('input', (e) => {

            var reader = new FileReader();
            reader.onload = function (e) {
                var contents = e.target.result;
                imageSrc.src = contents;

                //console.log('worker started');
                const image = new Image();
                image.onload = function () {
                    quantize(image);
                };
                image.src = contents;
            };
            reader.readAsDataURL(e.target.files[0]);
        }, false);

        function handleImageClick({ target }) {
            imageSrc.setAttribute('src',
                imageSrc.getAttribute('src') != target.getAttribute('src') ? target.getAttribute('src') : mainImageSrc);
            curImage = target;

            fillPaletteGrid(target.newColors == undefined ? target.uniqueColors : target.newColors);
            //minSlider.value = target.minFilterSize != undefined ? target.minFilterSize : 0;
            //minSliderValue.textContent = minSlider.value;

            if (target.newColors != undefined)
                updateImageWithPalette();
        }
        function handleCloseClick({ target }) {
            const thumbBar = document.querySelector('.thumb-bar');
            thumbBar.removeChild(target.parentElement);
        }
        function handleRunClick({ target }) {
            const img = target.parentElement.querySelector('img');
            if (img) {
                quantize(img);
            }
        }

        function quantize(image) {
            mainImageSrc = image.src || image;
            let imageData = loadImage(image);
            if (imageData.width > 0) {
                // Distribute the batch across the worker pool to run in parallel
                const batch = 9 / gridWorkers.length;
                const paletteSize = (typeof paletteSlider !== 'undefined' && paletteSlider && paletteSlider.value) ? parseInt(paletteSlider.value, 10) : 100;
                const rndFactor = (typeof randomSlider !== 'undefined' && randomSlider && randomSlider.value) ? parseInt(randomSlider.value, 10) : 600;
                for (let i = 0; i < gridWorkers.length; i++) {
                    totalAssignedTasks += batch;
                    progress.value = completedTasks / totalAssignedTasks;
                    progress.hidden = (progress.value >= 1);
                    gridWorkers[i].postMessage({
                        type: 'generatePalette',
                        data: {
                            imageData: imageData,
                            batch: batch,
                            paletteSize: paletteSize,
                            rndFactor: rndFactor,
                            filter: filter.checked,
                        }
                    });
                }
            } else {
                console.error('Failed to load image data for quantization');
            }
        }

        function loadImage(imageSource) {
            var img = null;
            if (typeof imageSource === 'string') {
                img = document.getElementById(imageSource);
            } else {
                img = imageSource;
            }
            var canvas = null;
            var ctx = null;
            if (img instanceof HTMLImageElement) {
                canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth || img.width;
                canvas.height = img.naturalHeight || img.height;
                ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                //document.getElementById('status').innerHTML = img.width;
            } else if (img instanceof HTMLCanvasElement || img instanceof OffscreenCanvas) {
                canvas = img;
                ctx = canvas.getContext('2d');
            } else {
                throw new Error('Please input the valid canvas or img id.');
                return;
            }
            var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            return imgData;// matFromImageData(imgData);
        };

        function add_grid_image(imagedata, uniqueColors) {
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d');
            canvas.width = imagedata.width;
            canvas.height = imagedata.height;
            ctx.putImageData(imagedata, 0, 0);

            var image = new Image();
            image.classList.add('stack');
            image.src = canvas.toDataURL();
            image.addEventListener('click', handleImageClick);
            image.uniqueColors = uniqueColors;

            const button = document.createElement("div");
            button.classList.add('close');
            let text = document.createTextNode('XX');
            button.appendChild(text);
            button.addEventListener('click', handleCloseClick);

            const button2 = document.createElement("div");
            button2.classList.add('run');
            let text2 = document.createTextNode('run');
            button2.appendChild(text2);
            button2.addEventListener('click', handleRunClick);

            const button3 = document.createElement("div");
            button3.classList.add('desc');
            let text3 = document.createTextNode('' + uniqueColors.length);
            button3.appendChild(text3);

            const box = document.createElement("div");
            box.classList.add('num-img');
            box.appendChild(image);
            box.appendChild(button);
            box.appendChild(button2);
            box.appendChild(button3);

            const thumbBar = document.querySelector('.thumb-bar');
            thumbBar.appendChild(box);
        }

        document.getElementById('status').innerHTML = '';

        function updateImageWithPalette() {
            if (!curImage)
                return;
            //const minFilterSize = (typeof minSlider !== 'undefined' && minSlider && minSlider.value) ? parseInt(minSlider.value, 10) : 0;
            curImage.newColors = readPaletteGrid();

            const imageData = loadImage(curImage);
            clearTimeout(updateImageTimeout);
            updateImageTimeout = setTimeout(() => {
                gridWorkers[0].postMessage({
                    type: 'updateImageWithPalette',
                    data: {
                        imageData: imageData,
                        oldColors: curImage.uniqueColors,
                        newColors: curImage.newColors,
                    }
                });
            }, 100);
        }

        var curColorBox = null;
        function initPaletteGrid() {
            const paletteGrid = document.getElementById('paletteGrid');
            const cols = 4;
            const rows = 24;
            for (let i = 0; i < cols * rows; i++) {
                const box = document.createElement('div');
                box.classList.add('palette-box');

                const colorInput = document.createElement('input');
                colorInput.type = 'color';
                colorInput.title = `Color ${i + 1}`;
                colorInput.dataset.index = i;
                colorInput.value = '#ffffff';
                colorInput.addEventListener('click', (e) => {
                    if (!e.shiftKey) {
                        e.preventDefault();
                        return false;
                    }
                });
                colorInput.addEventListener('change', (e) => {
                    updateImageWithPalette();
                });
                box.addEventListener('click', (e) => {
                    curColorBox = box;
                    minSlider.value = curColorBox.minSliderValue != undefined ? curColorBox.minSliderValue : 0;
                    minSliderValue.textContent = minSlider.value;

                    if (!e.shiftKey) {
                        box.classList.toggle('hidden');
                        updateImageWithPalette();
                    }
                });
                box.appendChild(colorInput);
                paletteGrid.appendChild(box);
            }
        }

        function fillPaletteGrid(uniqueColors) {
            const paletteGrid = document.getElementById('paletteGrid');
            const colorInputs = paletteGrid.querySelectorAll('input[type="color"]');
            colorInputs.forEach((input, index) => {
                if (index < uniqueColors.length) {
                    const intColor = uniqueColors[index].hex;
                    const a = (intColor >> 24) & 0xff;
                    if (a === 0) {
                        input.parentElement.classList.add('hidden');
                    } else {
                        input.parentElement.classList.remove('hidden');
                    }
                    const r = (intColor >> 16) & 0xff;
                    const g = (intColor >> 8) & 0xff;
                    const b = intColor & 0xff;
                    input.value = `rgb(${r}, ${g}, ${b})`;
                    input.parentElement.minSliderValue = uniqueColors[index].thickness != undefined ? uniqueColors[index].thickness : 0;
                } else {
                    input.value = 'rgb(255, 212, 183)';
                    input.parentElement.minSliderValue = 0;
                }
            });
        }

        function readPaletteGrid() {
            const paletteGrid = document.getElementById('paletteGrid');
            const colorInputs = paletteGrid.querySelectorAll('input[type="color"]');
            const colors = [];
            colorInputs.forEach((input) => {
                if (input.value == null || input.value === '')
                    return;
                const a = input.parentElement.classList.contains('hidden') ? 0 : 255;
                const hex = input.value.replace(/^#/, '');
                const intColor = parseInt(hex, 16) | (a << 24);

                let thickness = 0;
                if (input.parentElement.minSliderValue != undefined) {
                    thickness = parseInt(input.parentElement.minSliderValue, 10);
                }
                colors.push({ hex: intColor, thickness: thickness});
            });
            return colors;
        }

        // Initialize palette grid on page load
        window.addEventListener('load', initPaletteGrid);
    </script>

</body>

</html>
