<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <meta http-equiv='cache-control' content='no-cache'>
    <meta http-equiv='expires' content='0'>
    <meta http-equiv='pragma' content='no-cache'>
    <title>Сreate Numbers</title>
    <style>
        h1 {
            font-family: helvetica, arial, sans-serif;
            text-align: center;
            border: 0;
            margin: 0;
        }

        body {
            width: 95vw;
            /*    margin: 0 auto;
        */
            background-color: rgb(255, 212, 183);
            padding: 0 20px 20px 20px;
            /*border: 5px solid black;*/
        }

        .full-img img {
            display: inline-block;
            position: absolute;
            top: 0;
            left: 35%;
            max-height: 100%;
        }

        .num-img {
            float: left;
            position: relative;
        }

        .stack {
            position: relative;
            top: 0;
            left: 0;
            max-width: 40%;
            cursor: pointer;
        }

        .stack2 {
            position: absolute;
            top: 0;
            left: 0;
            max-width: 40%;
            cursor: pointer;
        }

        .close {
            position: absolute;
            top: 0;
            left: 0;
            cursor: no-drop;
        }

        .templates {
            display: inline-block;
            position: absolute;
            top: 0;
            left: 70%;
            /*    max-height: 100%;
        */
            width: 50%;
            height: 90vh;
            border: 0;
        }

        .button-num {
            /*  border: 0;
          background: rgb(194, 105, 105);
          text-shadow: 1px 1px 1px white;
          border: 1px solid #999;*/
            /*position: absolute;*/
            cursor: pointer;
            /*    top: 5px;
            left: 5px;*/
        }

        .progress {
            position: absolute;
            top: 35px;
            left: 5px;
        }

        .preview {
            position: absolute;
            top: 60px;
            width: 20%;
            height: 90vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgb(194, 105, 105) orange;
            /*min-width : 150px;*/
        }

        .thumb-bar {
            display: inline;
            /*width: 30%;*/
            float: left;
            /*cursor: pointer;*/
            /*border: 1px solid rgb(95, 55, 55);*/
        }
    </style>
</head>

<body>
    <div>
        <button class="button-num" id="btnCreate" type="button">Create</button>
        <!--<input type="file" id="btnCreate" name="Create" accept="image/png" />-->

        <progress id="progress" class="progress2" max="1" min="0" value="0"></progress>
    </div>
    <div>
        <div>
            <div id="boxCol" class="num-img">
                <img id="imgCol" alt="" class="stack" />
            </div>
            <input type="file" id="inpCol" accept="image/*" style="display:none" />
            <button class="button-num" id="btnCol" type="button">color</button>
        </div>
        <div>
            <div id="boxPal" class="num-img">
                <img id="imgPal" alt="" class="stack" />
            </div>
            <input type="file" id="inpPal" accept="image/*" style="display:none" />
            <button class="button-num" id="btnPal" type="button">palette</button>
        </div>
        <div>
            <div id="boxGrd" class="num-img">
                <img id="imgGrd" alt="" class="stack" />
            </div>
            <input type="file" id="inpGrd" accept="image/*" style="display:none" />
            <button class="button-num" id="btnGrd" type="button">grid</button>
        </div>
        <div>
            <div id="boxCmb" class="num-img">
                <img id="imgCmb" alt="" class="template-images" />
            </div>
        </div>
    </div>

    <script type="text/javascript">
        function checkInput(fi, fb, img) {
            const emptyFile = fi.files;
            fb.addEventListener(
                "click",
                (e) => {
                    fi.files = emptyFile;
                    fi.click();
                },
                false,
            );
            fi.addEventListener('input', (e) => {
                var reader = new FileReader();
                reader.onload = function (e) {
                    var contents = e.target.result;
                    img.src = contents;
                };
                reader.readAsDataURL(e.target.files[0]);
            }, false);

            img.parentNode.addEventListener('click', () => {
                const parent = img.parentNode;
                if (parent.children.length > 1) {
                    const el = parent.lastElementChild;
                    if (el && el.style) {
                        el.style.visibility = (el.style.visibility === 'hidden') ? 'visible' : 'hidden';
                    }
                }
                //console.log('click');
            }, false);
        }

        var inpColor = document.getElementById("inpCol");
        const imgColor = document.getElementById("imgCol");
        const btnColor = document.getElementById("btnCol");
        checkInput(inpColor, btnColor, imgColor);

        var inpPal = document.getElementById("inpPal");
        const imgPal = document.getElementById("imgPal");
        const btnPal = document.getElementById("btnPal");
        checkInput(inpPal, btnPal, imgPal);

        var inpGrd = document.getElementById("inpGrd");
        const imgGrd = document.getElementById("imgGrd");
        const btnGrd = document.getElementById("btnGrd");
        checkInput(inpGrd, btnGrd, imgGrd);

        const imgCombo = document.getElementById("imgCmb");

        let gridWorkers = [];
        let workerReady = false;
        const poolSize = 1;//Math.max(1, (navigator.hardwareConcurrency || 4) - 1);
        (async function initWorkerPool() {
            let blobUrl = 'numbers-worker.js';
            for (let i = 0; i < poolSize; i++) {
                const w = new Worker(blobUrl);
                w.onmessage = function (event) {
                    const { type, data, error } = event.data;
                    if (type === 'ready') {
                        workerReady = true;
                        console.log('worker ready (pool member)');
                    } else if (type === 'set_progress') {
                        set_progress(data.p);
                    } else if (type === 'add_out_image') {
                        add_out_image(data.imagedata);
                    } else if (type === 'error') {
                        console.error('Worker error:', error);
                    }
                };
                w.onerror = function (e) {
                    console.error('Worker pool member error:', e);
                };
                gridWorkers.push(w);
            }
        })();

        const btnCreate = document.getElementById("btnCreate");
        btnCreate.addEventListener(
            "click",
            (e) => {
                (async () => {
                    if (imgColor.parentNode.childNodes.length > 1)
                        imgColor.parentNode.removeChild(imgColor.parentNode.lastChild);
                    if (imgPal.parentNode.childNodes.length > 1)
                        imgPal.parentNode.removeChild(imgPal.parentNode.lastChild);
                    if (imgGrd.parentNode.childNodes.length > 1)
                        imgGrd.parentNode.removeChild(imgGrd.parentNode.lastChild);
                    //remove all childern of combo
                    imgCombo.parentNode.childNodes.forEach((child) => {
                        if (child !== imgCombo) {
                            imgCombo.parentNode.removeChild(child);
                        }
                    });

                    async function loadImageData(img) {
                        const image = new Image();
                        image.src = img.src;
                        await image.decode();
                        let imageData = loadImage(image);
                        return imageData;
                    };
                    var imgColData = await loadImageData(imgColor);
                    var imgPalData = await loadImageData(imgPal);
                    var imgGrdData = await loadImageData(imgGrd);

                    var make = function () {
                        console.log('make_numbers 1');
                        gridWorkers[0].postMessage({
                            type: 'makeNumbers',
                            data: {
                                imgColor: imgColData,
                                imgPal: imgPalData,
                                imgGrd: imgGrdData
                            }
                        });
                    }
                    make();
                })();
            },
            false,
        );

        function loadImage(imageSource) {
            var img = null;
            if (typeof imageSource === 'string') {
                img = document.getElementById(imageSource);
            } else {
                img = imageSource;
            }
            var canvas = null;
            var ctx = null;
            if (img instanceof HTMLImageElement) {
                canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(img, 0, 0, img.width, img.height);
            } else if (img instanceof HTMLCanvasElement || img instanceof OffscreenCanvas) {
                canvas = img;
                ctx = canvas.getContext('2d');
            } else {
                throw new Error('Please input the valid canvas or img id.');
                return;
            }
            var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            return imgData;// matFromImageData(imgData);
        };

        var numOuts = 0;
        function add_out_image(imagedata) {
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d');
            canvas.width = imagedata.width;
            canvas.height = imagedata.height;
            ctx.putImageData(imagedata, 0, 0);

            var image = new Image();
            image.src = canvas.toDataURL();
            var classes = ['stack2', 'stack2', 'stack2', 'stack']
            image.classList.add(classes[numOuts % 4]);

            //const box = document.createElement("div");
            //box.appendChild(image);

            //const thumbBar = document.querySelector('.out-img');
            var elems = ['boxCol', 'boxPal', 'boxGrd', 'boxCmb']
            var thumbBar = document.getElementById(elems[numOuts % 4]);
            thumbBar.appendChild(image);
            numOuts++;
        }

        function set_progress(p) {
            console.log('set_progress %f', p);
            var progress = document.getElementById("progress");
            progress.value = p;
            progress.hidden = p < 0;
        }
    </script>
</body>

</html>
